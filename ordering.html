<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Order - SkyLink</title>
        <link
            href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
            rel="stylesheet"
        />
        <link rel="stylesheet" href="index.css" />
        <style>

            /* ─── ordering.css — page-specific styles only ───────────────────────────── */
            /* All base vars, .top-nav, .panel, .dashboard-hero, etc. come from index.css */

            /* ── Shop layout ──────────────────────────────────────────────────────────── */
            .shop-layout {
                display: grid;
                gap: 18px;
                grid-template-columns: 1fr 320px;
                margin: 0 auto;
                max-width: 1180px;
                align-items: start;
            }

            /* ── Tab bar ──────────────────────────────────────────────────────────────── */
            .tab-bar {
                display: flex;
                flex-wrap: wrap;
                gap: 8px;
                margin-bottom: 14px;
            }

            .tab-btn {
                background: var(--sky-soft);
                border: 1px solid var(--sky-border);
                border-radius: 8px;
                color: var(--sky-muted);
                cursor: pointer;
                font-size: 0.88rem;
                font-weight: 700;
                padding: 8px 16px;
                transition: background 120ms, color 120ms;
            }

            .tab-btn:hover {
                background: #eaf2ff;
                color: var(--sky-primary);
            }

            .tab-btn--active {
                background: var(--sky-primary);
                border-color: var(--sky-primary);
                color: #ffffff;
            }

            .tab-btn--active:hover {
                background: var(--sky-primary-dark);
                color: #ffffff;
            }

            /* ── Menu rows ────────────────────────────────────────────────────────────── */
            .menu-row {
                align-items: center;
                display: flex;
                gap: 14px;
                padding: 14px 0;
            }

            .menu-row--bordered {
                border-bottom: 1px solid var(--sky-border);
            }

            .menu-emoji {
                font-size: 2rem;
                min-width: 40px;
                text-align: center;
            }

            .menu-info {
                flex: 1;
            }

            .menu-name {
                display: block;
                font-size: 0.95rem;
                font-weight: 700;
                margin-bottom: 2px;
            }

            .menu-desc {
                color: var(--sky-muted);
                font-size: 0.82rem;
            }

            .menu-price {
                color: var(--sky-primary-dark);
                font-size: 0.95rem;
                font-weight: 800;
                min-width: 48px;
                text-align: right;
            }

            /* ── Add / qty controls ───────────────────────────────────────────────────── */
            .add-btn {
                background: var(--sky-primary);
                border: none;
                border-radius: 8px;
                color: #ffffff;
                cursor: pointer;
                font-size: 0.82rem;
                font-weight: 700;
                padding: 6px 14px;
                white-space: nowrap;
                transition: background 120ms;
            }

            .add-btn:hover {
                background: var(--sky-primary-dark);
            }

            .qty-control {
                align-items: center;
                display: flex;
                gap: 8px;
            }

            .qty-btn {
                align-items: center;
                background: var(--sky-surface);
                border: 1px solid var(--sky-border);
                border-radius: 50%;
                cursor: pointer;
                display: flex;
                font-size: 1rem;
                font-weight: 700;
                height: 26px;
                justify-content: center;
                width: 26px;
                transition: background 120ms;
            }

            .qty-btn:hover {
                background: #eaf2ff;
            }

            .qty-val {
                font-size: 0.9rem;
                font-weight: 700;
                min-width: 18px;
                text-align: center;
            }

            /* ── Cart panel ───────────────────────────────────────────────────────────── */
            .cart-panel {
                position: sticky;
                top: 78px;
            }

            .cart-empty {
                color: var(--sky-muted);
                font-size: 0.88rem;
                line-height: 1.6;
                padding: 20px 0;
                text-align: center;
            }

            .cart-row {
                align-items: center;
                display: flex;
                gap: 10px;
                padding: 10px 0;
                border-bottom: 1px solid var(--sky-border);
            }

            .cart-emoji {
                font-size: 1.3rem;
                min-width: 24px;
            }

            .cart-info {
                flex: 1;
            }

            .cart-info strong {
                display: block;
                font-size: 0.85rem;
                font-weight: 700;
            }

            .cart-info span {
                color: var(--sky-muted);
                font-size: 0.78rem;
            }

            .cart-line-total {
                color: var(--sky-primary-dark);
                font-size: 0.88rem;
                font-weight: 800;
                margin-left: 6px;
                white-space: nowrap;
            }

            .review-btn {
                margin-top: 16px;
                width: 100%;
                justify-content: center;
            }

            /* ── Receipt / summary rows (shared checkout + cart) ─────────────────────── */
            .receipt-row {
                align-items: center;
                display: flex;
                font-size: 0.88rem;
                justify-content: space-between;
                padding: 5px 0;
            }

            .receipt-row.muted {
                color: var(--sky-muted);
            }

            .receipt-row.total-row {
                border-top: 2px solid var(--sky-border);
                font-size: 1rem;
                font-weight: 800;
                margin-top: 8px;
                padding-top: 10px;
            }

            /* ── Checkout layout ──────────────────────────────────────────────────────── */
            .checkout-grid {
                display: grid;
                gap: 18px;
                grid-template-columns: 1fr 1fr;
                margin: 0 auto;
                max-width: 1180px;
                align-items: start;
            }

            /* ── Payment form ─────────────────────────────────────────────────────────── */
            .field-label {
                color: var(--sky-muted);
                display: block;
                font-size: 0.82rem;
                font-weight: 700;
                margin-bottom: 4px;
                margin-top: 14px;
                text-transform: uppercase;
                letter-spacing: 0.05em;
            }

            .field-input {
                border: 1px solid var(--sky-border);
                border-radius: 8px;
                color: var(--sky-dark);
                font-size: 0.95rem;
                outline: none;
                padding: 10px 12px;
                width: 100%;
                box-sizing: border-box;
                transition: border-color 120ms;
            }

            .field-input:focus {
                border-color: var(--sky-primary);
            }

            .field-input.field-error {
                border-color: #dc3545;
            }

            .error-text {
                color: #dc3545;
                font-size: 0.78rem;
                margin: 3px 0 0;
            }

            .field-row {
                display: grid;
                gap: 12px;
                grid-template-columns: 1fr 1fr;
            }

            .security-note {
                background: var(--sky-soft);
                border: 1px solid var(--sky-border);
                border-radius: 8px;
                color: var(--sky-muted);
                font-size: 0.82rem;
                margin-top: 16px;
                padding: 10px 14px;
            }

            .confirm-btn {
                margin-top: 20px;
                width: 100%;
                justify-content: center;
            }

            .cancel-btn {
                margin-top: 8px;
                width: 100%;
                justify-content: center;
            }

            .payment-footnote {
                color: var(--sky-muted);
                font-size: 0.78rem;
                line-height: 1.55;
                margin-top: 14px;
            }

            /* ── Confirmed view ───────────────────────────────────────────────────────── */
            .order-confirmed-wrap {
                display: flex;
                justify-content: center;
                margin: 0 auto;
                max-width: 1180px;
            }

            .confirmed-panel {
                max-width: 480px;
                text-align: center;
                width: 100%;
                padding: 48px 32px;
            }

            .confirmed-icon {
                font-size: 3.5rem;
                margin-bottom: 16px;
            }

            .confirmed-panel h1 {
                font-size: 1.8rem;
                font-weight: 800;
                margin-bottom: 10px;
            }

            .confirmed-sub {
                color: var(--sky-muted);
                font-size: 0.95rem;
                line-height: 1.6;
                margin-bottom: 24px;
            }

            .confirmed-receipt {
                background: var(--sky-soft);
                border: 1px solid var(--sky-border);
                border-radius: 8px;
                margin: 0 auto 24px;
                padding: 18px;
                text-align: left;
            }

            /* ── Responsive ───────────────────────────────────────────────────────────── */
            @media (max-width: 900px) {
                .shop-layout,
                .checkout-grid {
                    grid-template-columns: 1fr;
                }

                .cart-panel {
                    position: static;
                }
            }

            @media (max-width: 560px) {
                .field-row {
                    grid-template-columns: 1fr;
                }
            }

        </style>

        <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
        <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
        <script src="https://unpkg.com/@babel/standalone@7.23.9/babel.min.js"></script>
        <script type="text/babel" src="ordering.js"></script>
    </head>
    <body>
        <div id="root"></div>

        <script type="text/babel">
            const container = document.getElementById("root");
            const root = ReactDOM.createRoot(container);
            root.render(<OrderingPage />);
        </script>
    </body>
</html>
